<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐉 OpenClaw Trading Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1a2235;
    --teal: #00E5CC;
    --gold: #c9a84c;
    --red: #ff4d6d;
    --green: #00ff88;
    --text: #e2e8f0;
    --muted: #64748b;
    --border: #1e2d45;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }
  
  header { background: linear-gradient(135deg, #0d1628 0%, #1a2235 100%); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  header h1 { font-size: 1.4rem; color: var(--teal); font-weight: 700; letter-spacing: 1px; }
  header h1 span { color: var(--gold); }
  #last-updated { color: var(--muted); font-size: 0.75rem; }
  #refresh-btn { background: var(--bg3); border: 1px solid var(--teal); color: var(--teal); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
  #refresh-btn:hover { background: var(--teal); color: var(--bg); }

  /* REGIME BANNER */
  #regime-banner { padding: 12px 20px; font-weight: 700; font-size: 1rem; text-align: center; letter-spacing: 2px; border-bottom: 1px solid var(--border); }
  #regime-banner.BULL { background: rgba(0,255,136,0.1); color: var(--green); border-color: var(--green); }
  #regime-banner.BEAR { background: rgba(255,77,109,0.1); color: var(--red); border-color: var(--red); }
  #regime-banner.NEUTRAL, #regime-banner.loading { background: rgba(201,168,76,0.1); color: var(--gold); border-color: var(--gold); }

  main { padding: 20px; display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
  @media (min-width: 900px) { main { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 1200px) { main { grid-template-columns: 1fr 1fr 1fr; } }

  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
  .card.wide { grid-column: 1 / -1; }
  .card h2 { color: var(--gold); font-size: 0.85rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

  /* SIGNALS TABLE */
  .signal-table { width: 100%; border-collapse: collapse; }
  .signal-table th { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; padding: 6px 8px; border-bottom: 1px solid var(--border); text-align: left; }
  .signal-table td { padding: 8px 8px; border-bottom: 1px solid rgba(30,45,69,0.5); font-size: 0.82rem; }
  .signal-table tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; }
  .badge.long { background: rgba(0,255,136,0.15); color: var(--green); }
  .badge.short { background: rgba(255,77,109,0.15); color: var(--red); }
  .badge.high { background: rgba(0,229,204,0.15); color: var(--teal); }
  .badge.med { background: rgba(201,168,76,0.15); color: var(--gold); }

  /* STRATEGY LEADERBOARD */
  .strategy-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(30,45,69,0.4); }
  .strategy-row:last-child { border-bottom: none; }
  .strategy-name { flex: 1; font-weight: 600; color: var(--text); }
  .strategy-score { font-size: 1.1rem; font-weight: 700; color: var(--teal); min-width: 40px; text-align: right; }
  .score-bar { height: 4px; background: var(--bg3); border-radius: 4px; flex: 2; overflow: hidden; }
  .score-bar-fill { height: 100%; background: linear-gradient(90deg, var(--teal), var(--gold)); border-radius: 4px; transition: width 0.6s; }

  /* PORTFOLIO STATS */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat-box { background: var(--bg3); border-radius: 8px; padding: 12px; }
  .stat-label { color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 1.3rem; font-weight: 700; color: var(--teal); margin-top: 4px; }
  .stat-value.positive { color: var(--green); }
  .stat-value.negative { color: var(--red); }

  /* GEM WATCHLIST */
  .gem-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(30,45,69,0.4); }
  .gem-row:last-child { border-bottom: none; }
  .gem-ticker { font-size: 1rem; font-weight: 800; color: var(--gold); min-width: 60px; }
  .gem-details { flex: 1; }
  .gem-name { color: var(--muted); font-size: 0.75rem; }
  .gem-stats { display: flex; gap: 12px; margin-top: 4px; flex-wrap: wrap; }
  .gem-stat { font-size: 0.75rem; }
  .gem-mcap { color: var(--text); }
  .gem-change { font-weight: 600; }
  .gem-change.up { color: var(--green); }
  .gem-change.down { color: var(--red); }
  .gem-vol { color: var(--teal); font-size: 0.7rem; }

  /* CHART */
  .chart-container { position: relative; height: 200px; }

  /* EMPTY STATES */
  .empty { color: var(--muted); text-align: center; padding: 24px; font-size: 0.85rem; }

  /* PULSE animation for live indicator */
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .live-dot { display: inline-block; width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
</style>
</head>
<body>

<header>
  <h1>🐉 OpenClaw <span>Intelligence</span></h1>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="live-dot"></span>
    <span id="last-updated">Loading...</span>
    <button id="refresh-btn" onclick="loadAll()">⟳ Refresh</button>
  </div>
</header>

<div id="regime-banner" class="loading">⏳ Loading market regime...</div>

<main>
  <!-- SIGNALS FEED -->
  <div class="card wide">
    <h2>🎯 Active Signals</h2>
    <div id="signals-container"><div class="empty">Loading signals...</div></div>
  </div>

  <!-- STRATEGY LEADERBOARD -->
  <div class="card">
    <h2>🏆 Strategy Scores</h2>
    <div id="strategies-container"><div class="empty">Loading...</div></div>
  </div>

  <!-- PAPER PORTFOLIO -->
  <div class="card">
    <h2>💼 Paper Portfolio</h2>
    <div id="portfolio-container"><div class="empty">Loading...</div></div>
  </div>

  <!-- GEM WATCHLIST -->
  <div class="card">
    <h2>💎 Gem Watchlist</h2>
    <div id="gems-container"><div class="empty">Loading...</div></div>
  </div>

  <!-- EQUITY CURVE -->
  <div class="card wide">
    <h2>📈 Equity Curve</h2>
    <div class="chart-container">
      <canvas id="equityChart"></canvas>
    </div>
  </div>
</main>

<script>
const DATA_BASE = './data';
let equityChartInstance = null;

function bust(url) { return url + '?t=' + Date.now(); }

async function fetchJson(name) {
  try {
    const res = await fetch(bust(`${DATA_BASE}/${name}`));
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch(e) {
    console.warn(`Failed to fetch ${name}:`, e.message);
    return null;
  }
}

function setRegimeBanner(data) {
  const el = document.getElementById('regime-banner');
  if (!data) { el.textContent = '⚠️ Regime data unavailable'; el.className = 'NEUTRAL'; return; }
  const regime = (data.regime || 'UNKNOWN').toUpperCase();
  const btc = data.btc_price ? ` | BTC $${Number(data.btc_price).toLocaleString()}` : '';
  const ts = data.timestamp ? ` | ${new Date(data.timestamp).toLocaleDateString()}` : '';
  el.textContent = `📊 REGIME: ${regime}${btc}${ts}`;
  el.className = regime.includes('BULL') ? 'BULL' : regime.includes('BEAR') ? 'BEAR' : 'NEUTRAL';
}

function renderSignals(data) {
  const el = document.getElementById('signals-container');
  if (!data) { el.innerHTML = '<div class="empty">No data yet</div>'; return; }
  const signals = data.active_signals || [];
  if (!signals.length) {
    const regime = data.market_regime || '';
    el.innerHTML = `<div class="empty">No active signals — ${regime ? regime + ' regime: sitting in cash' : 'Scanning...'}</div>`;
    return;
  }
  let html = `<table class="signal-table">
    <thead><tr><th>Coin</th><th>Dir</th><th>Entry</th><th>Stop</th><th>TP2</th><th>R:R</th><th>Conf</th><th>Edge</th><th>Reasoning</th></tr></thead><tbody>`;
  for (const s of signals) {
    const dir = (s.direction||'LONG').toLowerCase();
    const confClass = s.confidence >= 8 ? 'high' : 'med';
    html += `<tr>
      <td><strong style="color:var(--gold)">${s.coin}</strong></td>
      <td><span class="badge ${dir}">${s.direction}</span></td>
      <td style="color:var(--teal)">$${Number(s.entry_low||0).toFixed(2)}–${Number(s.entry_high||0).toFixed(2)}</td>
      <td style="color:var(--red)">$${Number(s.stop_loss||0).toFixed(2)}</td>
      <td style="color:var(--green)">$${Number(s.tp2||0).toFixed(2)}</td>
      <td>${s.rr_ratio||'?'}</td>
      <td><span class="badge ${confClass}">${s.confidence}/10</span></td>
      <td style="color:var(--teal);font-weight:700">${s.edge_score||'?'}</td>
      <td style="color:var(--muted);font-size:0.72rem;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(s.reasoning||'').split('|')[0]}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

function renderStrategies(data) {
  const el = document.getElementById('strategies-container');
  if (!data) { el.innerHTML = '<div class="empty">No data yet</div>'; return; }
  const results = data.results || data.strategy_scores || data;
  if (!Array.isArray(results) || !results.length) { el.innerHTML = '<div class="empty">No strategy data yet</div>'; return; }
  const sorted = [...results].sort((a,b) => (b.score||b.edge_score||0) - (a.score||a.edge_score||0)).slice(0,10);
  const maxScore = Math.max(...sorted.map(s => s.score||s.edge_score||1), 1);
  let html = '';
  for (const s of sorted) {
    const score = s.score || s.edge_score || 0;
    const pct = Math.round((score/maxScore)*100);
    const name = s.coin || s.name || s.strategy || 'Unknown';
    html += `<div class="strategy-row">
      <div class="strategy-name">${name}</div>
      <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%"></div></div>
      <div class="strategy-score">${score}</div>
    </div>`;
  }
  el.innerHTML = html;
}

function renderPortfolio(data) {
  const el = document.getElementById('portfolio-container');
  if (!data) { el.innerHTML = '<div class="empty">No data yet</div>'; return; }
  const balance = data.balance_aud || data.balance || 0;
  const initial = data.initial_balance || data.initial || 10000;
  const pnl = balance - initial;
  const pnlPct = initial ? (pnl/initial*100) : 0;
  const trades = data.trade_count || data.closed_trades || (data.closed||[]).length || 0;
  const winRate = data.win_rate_pct || data.win_rate || 0;
  const pnlClass = pnl >= 0 ? 'positive' : 'negative';
  const pnlSign = pnl >= 0 ? '+' : '';

  el.innerHTML = `<div class="stat-grid">
    <div class="stat-box">
      <div class="stat-label">Balance</div>
      <div class="stat-value">$${Number(balance).toLocaleString('en-AU', {maximumFractionDigits:0})}</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">P&L</div>
      <div class="stat-value ${pnlClass}">${pnlSign}${pnlPct.toFixed(1)}%</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Trades</div>
      <div class="stat-value">${trades}</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Win Rate</div>
      <div class="stat-value">${Number(winRate).toFixed(0)}%</div>
    </div>
  </div>`;

  // Build equity curve data if history available
  const history = data.history || data.equity_curve || [];
  if (history.length > 1) {
    renderEquityChart(history);
  }
}

function renderGems(data) {
  const el = document.getElementById('gems-container');
  if (!data) { el.innerHTML = '<div class="empty">No data yet</div>'; return; }
  const gems = Array.isArray(data) ? data : (data.gems || data.watchlist || []);
  if (!gems.length) { el.innerHTML = '<div class="empty">No gems found yet</div>'; return; }
  let html = '';
  for (const g of gems.slice(0, 8)) {
    const chg = parseFloat(g.price_change_24h || g.change_24h || 0);
    const chgClass = chg >= 0 ? 'up' : 'down';
    const chgSign = chg >= 0 ? '+' : '';
    const mcap = g.market_cap ? formatLargeNum(g.market_cap) : (g.market_cap_str || '?');
    const vol = g.volume_ratio ? `${Number(g.volume_ratio).toFixed(1)}x vol` : '';
    const score = g.gem_score || g.score;
    html += `<div class="gem-row">
      <div class="gem-ticker">${g.symbol||g.ticker||'?'}</div>
      <div class="gem-details">
        <div class="gem-name">${g.name||''}</div>
        <div class="gem-stats">
          <span class="gem-mcap gem-stat">Mcap: ${mcap}</span>
          <span class="gem-change ${chgClass} gem-stat">${chgSign}${chg.toFixed(1)}%</span>
          ${vol ? `<span class="gem-vol gem-stat">${vol}</span>` : ''}
          ${score ? `<span class="gem-stat" style="color:var(--gold)">Score: ${score}</span>` : ''}
        </div>
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

function renderEquityChart(history) {
  const ctx = document.getElementById('equityChart').getContext('2d');
  const labels = history.map((p, i) => p.date || p.timestamp || `T${i}`);
  const values = history.map(p => p.value || p.balance || p);
  if (equityChartInstance) equityChartInstance.destroy();
  equityChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Portfolio Value (AUD)',
        data: values,
        borderColor: '#00E5CC',
        backgroundColor: 'rgba(0,229,204,0.08)',
        fill: true,
        tension: 0.3,
        pointRadius: history.length > 30 ? 0 : 3,
        pointBackgroundColor: '#00E5CC',
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#64748b', maxTicksLimit: 8 }, grid: { color: '#1e2d45' } },
        y: { ticks: { color: '#64748b', callback: v => '$' + Number(v).toLocaleString() }, grid: { color: '#1e2d45' } }
      }
    }
  });
}

function formatLargeNum(n) {
  n = Number(n);
  if (n >= 1e9) return '$' + (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(0) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';
  return '$' + n;
}

async function loadAll() {
  document.getElementById('last-updated').textContent = 'Refreshing...';
  const [regime, signals, strategies, portfolio, gems] = await Promise.all([
    fetchJson('market_regime.json'),
    fetchJson('signals.json'),
    fetchJson('strategy_scores.json'),
    fetchJson('paper_portfolio.json'),
    fetchJson('gem_watchlist.json'),
  ]);

  setRegimeBanner(regime);
  renderSignals(signals);
  renderStrategies(strategies);
  renderPortfolio(portfolio);
  renderGems(gems);

  // Fallback equity chart if no history in portfolio
  const chartCanvas = document.getElementById('equityChart');
  if (!equityChartInstance) {
    const ctx = chartCanvas.getContext('2d');
    equityChartInstance = new Chart(ctx, {
      type: 'line',
      data: { labels: ['Start'], datasets: [{ label: 'No data yet', data: [10000], borderColor: '#64748b', backgroundColor: 'rgba(100,116,139,0.05)' }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#64748b' } } }, scales: { x: { ticks: { color: '#64748b' }, grid: { color: '#1e2d45' } }, y: { ticks: { color: '#64748b' }, grid: { color: '#1e2d45' } } } }
    });
  }

  document.getElementById('last-updated').textContent = '🕒 ' + new Date().toLocaleTimeString();
}

// Initial load + auto-refresh every 5 minutes
loadAll();
setInterval(loadAll, 5 * 60 * 1000);
</script>
</body>
</html>
